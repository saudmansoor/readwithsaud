<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Personal Report</title>

<style>
body{
  margin:0;
  font-family:'Open Sans',sans-serif;
  background:#0e0d0b;
  color:#f0ede6;
}

.w{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.badge{
  text-align:center;
  margin-bottom:15px;
  color:#c8b477;
}

.wpm-box{
  background:#f5f0e2;
  color:#000;
  padding:20px;
  border-radius:12px;
  text-align:center;
  margin-bottom:15px;
}

.good-news-box{
  background:#002810;
  border:2px solid #00cc66;
  padding:15px;
  border-radius:12px;
  text-align:center;
  margin:20px 0;
}

.cta-h{
  font-family:'Oswald',sans-serif;
  font-size:26px;
  font-weight:700;
  text-align:center;
  margin:20px 0;
}

.g{
  color:#c8b477;
}

.live-box{
  margin:15px auto;
  padding:10px 14px;
  border:2px solid #ff4444;
  border-radius:10px;
  text-align:center;
  font-weight:700;
}
</style>
</head>

<body>

<div class="w">

<div class="badge">Your Personal Report</div>

<div class="wpm-box">
  📖 YOUR READING SPEED<br><br>
  <span id="name"></span>, in 1 minute you read <b id="wpm"></b> words.
</div>

<div id="pain"></div>
<div id="weeks"></div>
<div id="months"></div>

<div class="good-news-box">
  Good News, <span id="good_name"></span>!
</div>

<div class="cta-h">
  You can now finish <span class="g">Atomic Habits</span> in just 7 days !
</div>

<div style="text-align:center;margin-bottom:10px;">
  1,000 people have already done it.
</div>

<div class="live-box">
  🔴 <span id="liveCount">30</span> People Enrolled Today!
</div>

</div>

<script>
if ('scrollRestoration' in history) {
  history.scrollRestoration = 'manual';
}

window.addEventListener('load', function(){
  setTimeout(function(){
    window.scrollTo(0,0);
  }, 50);
});

const params = new URLSearchParams(window.location.search);

const name = params.get("name") || "Friend";
const wpm = params.get("wpm") || 200;
const weeks = params.get("weeks") || 10;

document.getElementById("name").innerText = name;
document.getElementById("good_name").innerText = name;
document.getElementById("wpm").innerText = wpm;

document.getElementById("pain").innerText =
"By reading just 15 minutes a day, you will finish Atomic Habits in";

document.getElementById("weeks").innerText =
weeks + " weeks from today.";

document.getElementById("months").innerText =
"Almost " + (weeks/4).toFixed(1) + " months!";

let count = 30;

function updateCounter(){
  count++;
  document.getElementById("liveCount").innerText = count;
  let delay = (count % 2 === 0) ? 15000 : 20000;
  setTimeout(updateCounter, delay);
}

setTimeout(updateCounter, 5000);
</script>

</body>
</html>
